name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and package only. Skip tag and GitHub Release."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run bundle

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Ensure tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump the version in package.json before releasing."
            exit 1
          fi

      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-dependencies --out nowdoing-vscode-${{ steps.version.outputs.version }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: nowdoing-vscode-${{ steps.version.outputs.version }}
          path: nowdoing-vscode-${{ steps.version.outputs.version }}.vsix
          if-no-files-found: error

      - name: Tag release
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            nowdoing-vscode-${{ steps.version.outputs.version }}.vsix \
            --title "$TAG" \
            --notes "See CHANGELOG.md for details. The attached .vsix is uploaded to the Marketplace manually."
