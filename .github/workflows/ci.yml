name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run bundle

      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-dependencies --out nowdoing-vscode.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: nowdoing-vscode-vsix
          path: nowdoing-vscode.vsix
          if-no-files-found: error
